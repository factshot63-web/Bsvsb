<!DOCTYPE html>
<html>
<head>
    <title>My Avatar System</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
        model-viewer { width: 100%; height: 500px; }
        .controls { padding: 20px; }
    </style>
</head>
<body>

    <h1>مرحباً بك في نظام الأفاتار</h1>
    
    <model-viewer 
        src="https://models.readyplayer.me/64a500000000000000000000.glb" 
        alt="أفاتار المستخدم" 
        auto-rotate camera-controls>
    </model-viewer>

    <div class="controls">
        <p>هذا الأفاتار جاهز للتحريك!</p>
        <button onclick="alert('هنا سنقوم ببرمجة فتح الكاميرا للتحكم في الأفاتار!')">ابدأ التحكم بالوجه</button>
    </div>

</body>
</html>
