<!DOCTYPE html>
<html>
<head>
    <title>AI Avatar Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #webcam { position: absolute; width: 640px; height: 480px; }
        #canvas { position: absolute; width: 640px; height: 480px; }
    </style>
</head>
<body>
    <video id="webcam" style="display:none;"></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script type="module">
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults((results) => {
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiFaceLandmarks) {
                for (const landmarks of results.multiFaceLandmarks) {
                    // هنا يتم الرسم: يمكنك ربط إحداثيات الوجه بالأفاتار الخاص بك
                    console.log("الوجه مكتشف، الإحداثيات:", landmarks[0]);
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await faceMesh.send({image: videoElement}); },
            width: 640, height: 480
        });
        camera.start();
    </script>
</body>
</html>
