<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>3D Avatar Controller</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
margin:0;
background:#0b1220;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
width:420px;
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
}

model-viewer{
width:100%;
height:400px;
background:#fff;
border-radius:15px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#walk{background:#22c55e;color:white}
#idle{background:#3b82f6;color:white}
#run{background:#f59e0b;color:white}
</style>
</head>

<body>

<div class="box">

<h2>🔥 تحكم في شخصيتك 3D</h2>

<!-- 3D AVATAR -->
<model-viewer
id="avatar"
src="https://models.readyplayer.me/your-avatar.glb"
camera-controls
auto-rotate
></model-viewer>

<button id="idle" onclick="setAnim('Idle')">وضع الوقوف</button>
<button id="walk" onclick="setAnim('Walking')">مشي</button>
<button id="run" onclick="setAnim('Running')">جري</button>

</div>

<script>

const avatar=document.getElementById("avatar");

function setAnim(anim){
avatar.animationName=anim;
}

</script>

</body>
</html>
