<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Full Body Avatar Builder</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:420px;
background:#111827;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h2{margin-bottom:10px}

iframe{
width:100%;
height:500px;
border:none;
border-radius:15px;
background:white;
}

.small{
font-size:13px;
opacity:0.8;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>اصنع شخصيتك الكاملة 🔥</h2>

<!-- Avatar Creator (Full Body) -->
<iframe
src="https://readyplayer.me/avatar?frameApi"
allow="camera *; microphone *">
</iframe>

<div class="small">
بعد الانتهاء سيتم إنشاء أفاتار 3D كامل يشبهك 👌
</div>

</div>

</body>
</html>
