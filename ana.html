<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صانع الأفاتار الجبار</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; }
        #avatar-container { width: 100%; height: 600px; border: none; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>مرحباً بك في نظام إنشاء الأفاتار</h1>
    <p>اضغط على الزر لفتح الكاميرا وإنشاء أفاتارك الخاص</p>

    <iframe id="avatar-frame" 
            src="https://demo.readyplayer.me/avatar?frameApi" 
            allow="camera *; microphone *; clipboard-write"
            id="avatar-container" width="100%" height="600px">
    </iframe>

    <script>
        const frame = document.getElementById('avatar-frame');

        // يستقبل الحدث عند انتهاء المستخدم من إنشاء الأفاتار
        window.addEventListener('message', (event) => {
            if (event.data.source === 'readyplayerme') {
                const avatarUrl = event.data.url;
                console.log("تم إنشاء الأفاتار بنجاح! الرابط:", avatarUrl);
                alert("تم استلام الأفاتار الخاص بك، الرابط موجود في الـ Console");
                // هنا يمكنك تحويل المستخدم لصفحة العرض أو تحريك الأفاتار
            }
        });
    </script>
</body>
</html>
